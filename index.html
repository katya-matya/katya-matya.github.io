<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>КАТЯ МАТЯ</title>

	<style>
        * {
            padding: 0;
            margin: 0;
            box-sizing: border-box;
        }

        .images-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
        }

        .images-container img {
            height: 250px;
        }

        .main-heading {
            text-align: center;
            font-family: 'Courier New', Courier, monospace;
        }

        #mainHeading {
            margin: 50px 0;
        }
    </style>
</head>
<body>
    <h1 class="main-heading" id="mainHeading">КАТЯ МАТЯ</h1>

    <div class="images-container">
        <img src="images/1.jpg" alt="jopa 1">
        <img src="images/2.jpg" alt="jopa 2">
        <img src="images/3.jpg" alt="jopa 3">
    </div>
</body>
</html>
